{{template "base" .}}
{{define "title"}}{{.Handle}}.fader.bio{{end}}
{{define "content"}}
<main class="min-h-screen bg-black text-white flex items-center justify-center px-4">
  <div class="text-center space-y-6 max-w-md">
    <div class="text-6xl">🎛️</div>
    <h1 class="text-2xl font-bold"><span class="text-gray-400">{{.Handle}}</span>.fader.bio</h1>
    <p class="text-gray-400">This handle isn't taken yet.</p>
    <a href="/auth/register?handle={{.Handle}}" class="inline-block px-8 py-3 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition">Claim it →</a>
  </div>
</main>
{{end}}
