<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin: Edit {{.Profile.Handle}} - fader.bio</title>
  <link rel="stylesheet" href="/static/css/app.css?v=7">
</head>
<body class="bg-gray-950 text-white">
<nav class="border-b border-gray-800 px-6 py-4 flex items-center gap-4">
  <a href="/admin" class="text-sm text-gray-400 hover:text-white">← Admin</a>
  <span class="text-gray-600">/</span>
  <span class="text-sm">{{.Profile.Handle}}</span>
  <span class="text-xs text-gray-500 ml-2">Owner: {{.Owner.Email}}</span>
</nav>

<main class="max-w-2xl mx-auto py-8 px-4 space-y-6">
  <h1 class="text-xl font-bold">Edit profile: {{.Profile.Handle}}</h1>

  <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 space-y-4">
    <h2 class="font-semibold">Blocks ({{len .Blocks}})</h2>
    {{range .Blocks}}
    <div class="flex items-center justify-between text-sm py-2 border-b border-gray-800 last:border-0">
      <span class="capitalize text-gray-300">{{.Type}}</span>
      <span class="text-gray-600 text-xs">pos {{.Position}}</span>
    </div>
    {{end}}
  </div>
</main>
</body>
</html>
