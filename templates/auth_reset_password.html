<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password - fader.bio</title>
  <link rel="stylesheet" href="/static/css/app.css?v=6">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center px-4">

  <div class="w-full max-w-sm space-y-6">

    <div class="text-center space-y-1">
      <a href="/" class="inline-block font-black text-xl tracking-tight hover:text-zinc-300 transition">fader.bio</a>
      <p class="text-zinc-500 text-sm">Set a new password</p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
      <div id="error-msg" class="hidden bg-red-950/60 border border-red-900/60 rounded-xl px-4 py-3 text-sm text-red-400"></div>
      <div id="invalid-link" class="hidden">
        <p class="text-sm text-zinc-400 text-center">This reset link is invalid or has expired.</p>
        <a href="/auth/forgot-password" class="block mt-3 w-full py-3 text-center bg-white text-black text-sm font-bold rounded-xl hover:bg-zinc-100 transition">
          Request a new link
        </a>
      </div>
      <form id="reset-form" class="hidden space-y-4" method="POST" action="/auth/set-password">
        <input type="hidden" name="access_token" id="access_token_input">
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-zinc-400">New password</label>
          <input name="password" id="password_input" type="password" required minlength="8" autofocus placeholder="at least 8 characters"
            class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-sm text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-500 focus:border-zinc-500 transition">
        </div>
        <button type="submit"
          class="w-full py-3 bg-white text-black text-sm font-bold rounded-xl hover:bg-zinc-100 transition">
          Set password
        </button>
      </form>
    </div>

  </div>

  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function(part) {
        var kv = part.split('=');
        if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
      });

      if (params.type === 'recovery' && params.access_token) {
        document.getElementById('access_token_input').value = params.access_token;
        document.getElementById('reset-form').classList.remove('hidden');
        // Clean the token from the URL bar
        history.replaceState(null, '', window.location.pathname);
      } else {
        document.getElementById('invalid-link').classList.remove('hidden');
      }
    })();
  </script>

</body>
</html>
