<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your page - fader.bio</title>
  <link rel="stylesheet" href="/static/css/app.css?v=3">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <div class="w-full max-w-sm space-y-6">

    <div class="text-center space-y-1">
      <a href="/" class="inline-block font-black text-xl tracking-tight hover:text-zinc-300 transition">fader.bio</a>
      <p class="text-zinc-500 text-sm">Create your DJ page in seconds</p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
      {{if .Error}}
      <div class="bg-red-950/60 border border-red-900/60 rounded-xl px-4 py-3 text-sm text-red-400">
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/auth/register" class="space-y-4">
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-zinc-400">Your handle</label>
          <div class="flex items-stretch bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden focus-within:ring-1 focus-within:ring-zinc-500 focus-within:border-zinc-500 transition">
            <input name="handle" type="text" placeholder="yourname" value="{{.Handle}}" required
              autocomplete="off" autocapitalize="none" style="text-transform:lowercase"
              hx-get="/handles/check" hx-trigger="keyup changed delay:300ms" hx-target="#handle-status" hx-swap="innerHTML"
              class="flex-1 px-4 py-3 bg-transparent text-sm text-white placeholder-zinc-600 focus:outline-none min-w-0">
            <span class="px-3 flex items-center text-zinc-500 text-xs border-l border-zinc-700 shrink-0 whitespace-nowrap">.fader.bio</span>
          </div>
          <div id="handle-status" class="min-h-4">
            <p class="text-xs text-zinc-600">Lowercase letters, numbers, hyphens · 3–30 chars</p>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-zinc-400">Email</label>
          <input name="email" type="email" required placeholder="you@example.com"
            class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-sm text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-500 focus:border-zinc-500 transition">
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-zinc-400">Password</label>
          <input name="password" type="password" required minlength="8" placeholder="8+ characters"
            class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-sm text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-500 focus:border-zinc-500 transition">
        </div>

        <button type="submit"
          class="w-full py-3 bg-white text-black text-sm font-bold rounded-xl hover:bg-zinc-100 transition">
          Create account
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-zinc-500">
      Already have an account? <a href="/auth/login" class="text-white font-medium hover:underline">Log in →</a>
    </p>
  </div>

</body>
</html>
