{{template "base" .}}
{{define "title"}}Register — fader.bio{{end}}
{{define "content"}}
<main class="min-h-screen bg-black text-white flex items-center justify-center px-4">
  <div class="w-full max-w-md space-y-6">
    <h1 class="text-3xl font-bold text-center">Create your page</h1>
    {{if .Error}}<p class="text-red-400 text-sm text-center">{{.Error}}</p>{{end}}
    <form method="POST" action="/auth/register" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Handle</label>
        <div class="flex items-center border border-gray-700 rounded-lg overflow-hidden">
          <span class="px-3 py-2 bg-gray-900 text-gray-500 text-sm border-r border-gray-700">fader.bio/</span>
          <input name="handle" type="text" placeholder="yourname" required
            class="flex-1 px-3 py-2 bg-black text-white focus:outline-none lowercase" autocomplete="off">
        </div>
        <p class="text-xs text-gray-600 mt-1">3–30 characters, lowercase letters and numbers only</p>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input name="email" type="email" required class="w-full px-3 py-2 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-gray-400">
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input name="password" type="password" required minlength="8" class="w-full px-3 py-2 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-gray-400">
      </div>
      <button type="submit" class="w-full py-3 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition">Create account</button>
    </form>
    <p class="text-center text-sm text-gray-500">Already have an account? <a href="/auth/login" class="text-white hover:underline">Log in</a></p>
  </div>
</main>
{{end}}
