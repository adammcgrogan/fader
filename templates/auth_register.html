<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your page — fader.bio</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center px-4">

  <div class="w-full max-w-sm space-y-8">
    <div class="text-center space-y-1">
      <a href="/" class="font-bold text-lg tracking-tight hover:text-zinc-300 transition">fader.bio</a>
      <p class="text-zinc-500 text-sm">Create your DJ page in seconds</p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-7 space-y-5">
      {{if .Error}}
      <div class="bg-red-950/50 border border-red-900 rounded-lg px-4 py-3 text-sm text-red-400">
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/auth/register" class="space-y-4">
        <div class="space-y-1.5">
          <label class="block text-xs font-medium text-zinc-400 uppercase tracking-wider">Your handle</label>
          <div class="flex items-stretch border border-zinc-700 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-zinc-600 transition">
            <span class="px-3 flex items-center bg-zinc-800 text-zinc-500 text-sm border-r border-zinc-700 shrink-0">fader.bio/</span>
            <input name="handle" type="text" placeholder="yourname" value="{{.Handle}}" required
              autocomplete="off" style="text-transform:lowercase"
              class="flex-1 px-3 py-2.5 bg-zinc-800 text-sm text-white placeholder-zinc-500 focus:outline-none">
          </div>
          <p class="text-xs text-zinc-600">Lowercase letters, numbers, hyphens · 3–30 chars</p>
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-medium text-zinc-400 uppercase tracking-wider">Email</label>
          <input name="email" type="email" required
            class="w-full px-3 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-600 transition">
        </div>

        <div class="space-y-1.5">
          <label class="block text-xs font-medium text-zinc-400 uppercase tracking-wider">Password</label>
          <input name="password" type="password" required minlength="8"
            class="w-full px-3 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-600 transition">
        </div>

        <button type="submit"
          class="w-full py-2.5 bg-white text-black text-sm font-semibold rounded-lg hover:bg-zinc-100 transition mt-1">
          Create account
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-zinc-500">
      Already have an account? <a href="/auth/login" class="text-white hover:underline">Log in →</a>
    </p>
  </div>

</body>
</html>
