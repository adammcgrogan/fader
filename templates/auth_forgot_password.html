<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — fader.bio</title>
  <link rel="stylesheet" href="/static/css/app.css?v=3">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center px-4">

  <div class="w-full max-w-sm space-y-6">

    <div class="text-center space-y-1">
      <a href="/" class="inline-block font-black text-xl tracking-tight hover:text-zinc-300 transition">fader.bio</a>
      <p class="text-zinc-500 text-sm">Reset your password</p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
      {{if .Error}}
      <div class="bg-red-950/60 border border-red-900/60 rounded-xl px-4 py-3 text-sm text-red-400">
        {{.Error}}
      </div>
      {{end}}

      {{if .Success}}
      <div class="bg-green-950/60 border border-green-900/60 rounded-xl px-4 py-3 text-sm text-green-400">
        If an account exists for that email, we've sent a password reset link. Check your inbox.
      </div>
      <a href="/auth/login" class="block w-full py-3 text-center bg-white text-black text-sm font-bold rounded-xl hover:bg-zinc-100 transition">
        Back to login
      </a>
      {{else}}
      <form method="POST" action="/auth/forgot-password" class="space-y-4">
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-zinc-400">Email address</label>
          <input name="email" type="email" required autofocus placeholder="you@example.com"
            class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-sm text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-500 focus:border-zinc-500 transition">
        </div>
        <button type="submit"
          class="w-full py-3 bg-white text-black text-sm font-bold rounded-xl hover:bg-zinc-100 transition">
          Send reset link
        </button>
      </form>
      {{end}}
    </div>

    <p class="text-center text-sm text-zinc-500">
      <a href="/auth/login" class="text-white font-medium hover:underline">← Back to login</a>
    </p>

  </div>

</body>
</html>
