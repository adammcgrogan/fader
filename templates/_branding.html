{{define "profile_branding_style"}}
<style>
  :root {
    {{if .AccentColor}}--fader-accent: {{.AccentColor}};{{end}}
    {{if .FontFamily}}
      {{if eq (deref .FontFamily) "serif"}}--fader-font: Georgia, 'Times New Roman', serif;{{end}}
      {{if eq (deref .FontFamily) "mono"}}--fader-font: ui-monospace, SFMono-Regular, Menlo, monospace;{{end}}
      {{if eq (deref .FontFamily) "rounded"}}--fader-font: ui-rounded, 'SF Pro Rounded', system-ui, sans-serif;{{end}}
    {{end}}
  }
  {{if .AccentColor}}
  a:hover, button:hover { color: {{.AccentColor}}; }
  .text-blue-500, .text-orange-500 { color: {{.AccentColor}} !important; }
  {{end}}
</style>
{{end}}
