{{template "base" .}}
{{define "title"}}Log in — fader.bio{{end}}
{{define "content"}}
<main class="min-h-screen bg-black text-white flex items-center justify-center px-4">
  <div class="w-full max-w-md space-y-6">
    <h1 class="text-3xl font-bold text-center">Log in</h1>
    {{if .Error}}<p class="text-red-400 text-sm text-center">{{.Error}}</p>{{end}}
    <form method="POST" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input name="email" type="email" required class="w-full px-3 py-2 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-gray-400">
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input name="password" type="password" required class="w-full px-3 py-2 bg-black border border-gray-700 rounded-lg text-white focus:outline-none focus:border-gray-400">
      </div>
      <button type="submit" class="w-full py-3 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition">Log in</button>
    </form>
    <p class="text-center text-sm text-gray-500">No account? <a href="/auth/register" class="text-white hover:underline">Sign up</a></p>
  </div>
</main>
{{end}}
